name: Docs quality

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'blog/**'
      - 'src/**'
      - 'static/**'
      - '.vale.ini'
      - '.vale/**'
      - 'docusaurus.config.js'
      - 'sidebars.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs-quality.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  vale:
    name: Prose lint (Vale + Google style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Vale
        uses: errata-ai/vale-action@reviewdog
        with:
          version: 3.9.1
          fail_on_error: true
          filter_mode: nofilter
          reporter: github-pr-review
          files: '["docs", "blog", "CONTRIBUTING.md", "README.md"]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (catches broken internal links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GA_MEASUREMENT_ID: ''

  links:
    name: External link check (Lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore Lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-
      - name: Pre-process markdown to strip internal Docusaurus links
        # Lychee's URL parser hard-fails on root-relative links like
        # /docs/foo before --exclude can be applied, and the Docusaurus
        # build job already validates internal links via
        # onBrokenLinks: 'throw'. Strip them here so Lychee only sees
        # external links — its actual job.
        run: |
          set -euo pipefail
          mkdir -p .lychee-tmp
          while IFS= read -r src; do
            dest=".lychee-tmp/$src"
            mkdir -p "$(dirname "$dest")"
            sed -E \
              -e 's|\]\(/(docs|blog)/[^)]*\)|](https://example.com/_skipped)|g' \
              -e 's|href=\{"/(docs\|blog)/[^"]*"\}|href={"https://example.com/_skipped"}|g' \
              "$src" > "$dest"
          done < <(find docs blog -type f \( -name '*.md' -o -name '*.mdx' \); echo README.md; echo CONTRIBUTING.md)
      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --accept '200..=299,999'
            --exclude '^/'
            --exclude '^https?://(localhost|example\.com|.*\.example|taskflow\.io)'
            './.lychee-tmp/**/*.md'
            './.lychee-tmp/**/*.mdx'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
