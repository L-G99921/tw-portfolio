StylesPath = .vale/styles
MinAlertLevel = suggestion

Packages = Google, write-good

Vocab = Portfolio

[*.{md,mdx}]
BasedOnStyles = Vale, Google, write-good

# Headings are enforced via writing-guideline.md and reviewed in PRs;
# Vale's heuristic raises noise on intentional product-name capitalisation.
Google.Headings = NO

# Anchor- and link-rich Diátaxis content tends to trip these without adding signal.
Vale.Repetition = NO
write-good.TooWordy = warning
write-good.E-Prime = NO

# The portfolio uses spaced em-dashes ( — ) consistently across long-form
# prose for readability. Google's rule (no spaces around em-dash) reflects
# US technical-writing convention; the BR/UK convention used here is also
# valid and is enforced editorially.
Google.EmDash = NO

# Punctuation outside quotation marks unless it belongs to the quoted
# material — the BR/UK "logical" convention rather than the US "always
# inside" convention. Documented in writing-guideline.md.
Google.Quotes = NO

# The site uses 24-hour time formatting throughout; AM/PM nudges from
# Google's rule fire on tutorial step labels that read like "Step 1:00".
Google.AMPM = NO

# The portfolio explains the Google rule on Latin abbreviations by
# *quoting* "e.g." and "i.e." as examples to avoid. The Google.Latin
# rule then flags those mentions as actual usages. Disabling so the
# meta-discussion in methodology.md and writing-guideline.md doesn't
# self-fail.
Google.Latin = NO

# write-good's "there is/are" detector fires on legitimate technical
# constructions ("There are three audiences", "There is no opt-out").
# Kept as suggestion only via the existing TooWordy = warning override
# pattern wouldn't help here — this rule has no nuance setting.
write-good.ThereIs = NO

[docs/api/**]
# Auto-generated from OpenAPI via docusaurus-plugin-openapi-docs — not authored prose.
BasedOnStyles =

[blog/**]
# Blog posts allow first-person and opinion framing.
Google.FirstPerson = NO
Google.We = NO
Google.Will = NO

[CONTRIBUTING.md]
# Contributor docs are second-person imperative; allow "we" for project-team voice.
Google.We = NO
